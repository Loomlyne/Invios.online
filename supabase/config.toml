project_id = "invios"

[auth]
enabled = true
site_url = "https://invios.online"
additional_redirect_urls = [
  "https://invios.online/auth/confirm",
  "https://invios.online/app",
  "https://invios.online/update-password",
  "http://localhost:3000/auth/confirm",
  "http://localhost:3000/app",
  "http://localhost:3000/update-password",
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = false

[auth.email.template.confirmation]
subject = "Confirm your Invios email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Invios password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm your new Invios email"
content_path = "./supabase/templates/email-change.html"
